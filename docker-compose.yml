services:
  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    ports:
      - "5000:5000"
    environment:
      - PORT=5000

  frontend:
    build:
      context: ./Frontend/my-app
      args:
        - VITE_API_URL=http://localhost:5000
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
